<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALPRO UNIFORM - Platform Dinamis Supabase</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  
  <style>
    :root {
      --primary-color: #0d6efd;
      --sidebar-bg: #1e293b;
      --content-bg: #f1f5f9;
      --accent-color: #38bdf8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--content-bg);
      overflow-x: hidden;
    }

    #sidebar {
      min-width: 260px;
      max-width: 260px;
      background-color: var(--sidebar-bg);
      min-height: 100vh;
      transition: all 0.3s;
    }

    .sidebar-link {
      color: #94a3b8;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      transition: all 0.2s;
      border-radius: 8px;
      margin: 4px 12px;
    }

    .sidebar-link:hover, .sidebar-link.active {
      background-color: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .main-content {
      width: 100%;
      padding: 30px;
    }

    .loader {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.7);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="loader" id="globalLoader">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div class="d-flex">
    <div id="sidebar" class="text-white pt-4">
      <div class="px-4 mb-4">
        <h5 class="fw-bold text-accent"><i class="bi bi-shirt-fill me-2"></i>ALPRO UNIFORM</h5>
        <small class="text-muted">HQ Operation Support</small>
      </div>
      <nav class="mt-4">
        <a href="#" class="sidebar-link active" onclick="switchMenu('dashboard', this)"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
        <a href="#" class="sidebar-link" onclick="switchMenu('stok', this)"><i class="bi bi-box-seam me-2"></i> Master Stok Gudang</a>
        <a href="#" class="sidebar-link" onclick="switchMenu('request', this)"><i class="bi bi-clipboard-plus me-2"></i> Request (Alokasi Keluar)</a>
        <a href="#" class="sidebar-link" onclick="switchMenu('seragam_masuk', this)"><i class="bi bi-arrow-down-left-circle me-2"></i> Seragam Masuk</a>
        <a href="#" class="sidebar-link" onclick="switchMenu('peminjaman', this)"><i class="bi bi-arrow-up-right-circle me-2"></i> Peminjaman Event</a>
        <a href="#" class="sidebar-link" onclick="switchMenu('transaksi', this)"><i class="bi bi-arrow-left-right me-2"></i> Riwayat Transaksi</a>
      </nav>
    </div>

    <div class="main-content">
      <div id="app"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    // ⚠️ MASUKKAN URL & ANON KEY SUPABASE ASLI KAMU DI SINI
    const SUPABASE_URL = "https://mlpizvcjubahyqlgwpmb.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1scGl6dmNqdWJhaHlxbGd3cG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxOTMyMjEsImV4cCI6MjA4ODc2OTIyMX0.wxxlizU7FqX8v_HwhhURAPWj_XbmZVQjBq1Hbi6iStA";

    const supabaseHeaders = {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json"
    };

    function showLoader(show) {
      document.getElementById('globalLoader').style.display = show ? 'flex' : 'none';
    }

    function switchMenu(menu, element) {
      document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      
      if(menu === 'dashboard') renderDashboard();
      if(menu === 'stok') renderStokGudang();
      if(menu === 'request') renderRequestSeragam();
      if(menu === 'seragam_masuk') renderSeragamMasuk();
      if(menu === 'peminjaman') renderPeminjamanEvent();
      if(menu === 'transaksi') renderRiwayatTransaksi();
    }

    // ==========================================
    // 1. MENU DASHBOARD SUMMARY
    // ==========================================
    async function renderDashboard() {
      showLoader(true);
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/dashboard_ringkasan_gudang`, { headers: supabaseHeaders });
        const data = await res.json();
        const d = data[0] || { total_stok_baru_layak: 0, total_request_pending: 0, alokasi_bulan_ini: 0, peminjaman_aktif: 0, varian_stok_kritis: 0 };

        document.getElementById('app').innerHTML = `
          <h3 class="fw-bold mb-4">Dashboard Ringkasan</h3>
          <div class="row g-4">
            <div class="col-md-4">
              <div class="card border-0 shadow-sm p-4 bg-white">
                <div class="text-muted small text-uppercase fw-bold">Stok Baru / Layak</div>
                <div class="display-5 fw-bold text-primary mt-2">${d.total_stok_baru_layak} <span class="fs-6 text-muted">pcs</span></div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card border-0 shadow-sm p-4 bg-white">
                <div class="text-muted small text-uppercase fw-bold">Request Pending</div>
                <div class="display-5 fw-bold text-warning mt-2">${d.total_request_pending} <span class="fs-6 text-muted">surat</span></div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card border-0 shadow-sm p-4 bg-white">
                <div class="text-muted small text-uppercase fw-bold">Alokasi Bulan Ini</div>
                <div class="display-5 fw-bold text-success mt-2">${d.alokasi_bulan_ini} <span class="fs-6 text-muted">pcs</span></div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="card border-0 shadow-sm p-4 bg-white">
                <div class="text-muted small text-uppercase fw-bold">Peminjaman Status Aktif</div>
                <div class="display-6 fw-bold text-info mt-2">${d.peminjaman_aktif} <span class="fs-6 text-muted">item</span></div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="card border-0 shadow-sm p-4 bg-white">
                <div class="text-muted small text-uppercase fw-bold">Varian Jenis Seragam Kritis</div>
                <div class="display-6 fw-bold text-danger mt-2">${d.varian_stok_kritis} <span class="fs-6 text-muted">varian (≤ 5 pcs)</span></div>
              </div>
            </div>
          </div>
        `;
      } catch (err) { console.error(err); }
      showLoader(false);
    }

    // ==========================================
    // 2. MENU MASTER STOK GUDANG
    // ==========================================
    async function renderStokGudang() {
      showLoader(true);
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/monitor_stok_gudang`, { headers: supabaseHeaders });
        const data = await res.json();

        let rows = data.map(s => `
          <tr>
            <td><strong>#${s.seragam_id}</strong></td>
            <td>${s.nama_seragam}</td>
            <td><span class="badge bg-light text-dark">${s.gender}</span></td>
            <td><span class="fw-bold">${s.ukuran}</span></td>
            <td class="text-success fw-bold">${s.stok_baru_dan_layak} pcs</td>
            <td class="text-warning fw-bold">${s.stok_bekas_tidak_layak} pcs</td>
            <td class="table-primary fw-bold text-center">${s.total_stok_fisik} pcs</td>
          </tr>
        `).join('');

        document.getElementById('app').innerHTML = `
          <div class="card p-4 shadow-sm border-0 bg-white">
            <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-box-seam me-2"></i>Master Transparansi Stok Gudang</h4>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light text-uppercase small">
                  <tr>
                    <th>ID Seragam</th><th>Nama Item</th><th>Gender</th><th>Ukuran</th>
                    <th>Baru / Layak</th><th>Bekas (Event Only)</th><th class="text-center">Total Fisik Gudang</th>
                  </tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="7" class="text-center">Gudang kosong.</td></tr>'}</tbody>
              </table>
            </div>
          </div>
        `;
      } catch (err) { console.error(err); }
      showLoader(false);
    }

    // ==========================================
    // 3. MENU REQUEST SERAGAM (ALOKASI KELUAR)
    // ==========================================
    async function renderRequestSeragam() {
      showLoader(true);
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/request_seragam?order=id.desc`, { headers: supabaseHeaders });
        const data = await res.json();

        let rows = data.map(r => `
          <tr>
            <td>${r.nama_karyawan} (NIP: ${r.nip || '-'})</td>
            <td>${r.posisi_kerja}</td>
            <td>${r.departemen_cabang}</td>
            <td><span class="badge bg-info text-dark">${r.gender_karyawan || '-'}</span></td>
            <td><small>Jas: ${r.ukuran_jas || '-'}<br>Kemeja: ${r.ukuran_kemeja || '-'}<br>Kaos: ${r.ukuran_kaos || '-'}</small></td>
            <td>
              <select class="form-select form-select-sm fw-bold ${r.status_request === 'Disetujui' ? 'text-success' : 'text-warning'}" 
                onchange="ubahStatusRequest(${r.id}, this.value)">
                <option value="Pending" ${r.status_request === 'Pending' ? 'selected' : ''}>⏳ Pending</option>
                <option value="Disetujui" ${r.status_request === 'Disetujui' ? 'selected' : ''}>✅ Disetujui</option>
              </select>
            </td>
          </tr>
        `).join('');

        document.getElementById('app').innerHTML = `
          <div class="card p-4 shadow-sm border-0 bg-white mb-4">
            <h5 class="fw-bold text-dark mb-2"><i class="bi bi-file-earmark-spreadsheet-fill text-success me-2"></i>Upload Request Seragam via CSV</h5>
            <div class="row g-3 align-items-center mt-1">
              <div class="col-auto"><input type="file" id="csvFilePicker" accept=".csv" class="form-control form-control-sm"></div>
              <div class="col-auto"><button class="btn btn-sm btn-primary px-3" onclick="eksekusiUploadCSV()"><i class="bi bi-cloud-upload me-1"></i> Jalankan Upload</button></div>
              <div class="col-auto"><button class="btn btn-sm btn-outline-success px-3" onclick="downloadTemplateRequest()"><i class="bi bi-download me-1"></i> Download Template CSV</button></div>
            </div>
          </div>

          <div class="card p-4 shadow-sm border-0 bg-white">
            <h4 class="fw-bold mb-4 text-primary">Daftar Permintaan Jatah Seragam Karyawan</h4>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light text-uppercase small">
                  <tr><th>Nama Karyawan</th><th>Posisi</th><th>Cabang</th><th>Gender</th><th>Ukuran Jatah</th><th>Status</th></tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="6" class="text-center">Belum ada data.</td></tr>'}</tbody>
              </table>
            </div>
          </div>
        `;
      } catch (err) { console.error(err); }
      showLoader(false);
    }

    async function ubahStatusRequest(id, statusBaru) {
      showLoader(true);
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/request_seragam?id=eq.${id}`, {
          method: "PATCH",
          headers: supabaseHeaders,
          body: JSON.stringify({ status_request: statusBaru })
        });
        if (res.ok) {
          Swal.fire('Berhasil!', `Status diperbarui menjadi ${statusBaru}.`, 'success');
          renderRequestSeragam();
        }
      } catch (err) { console.error(err); }
      showLoader(false);
    }

    // ==========================================
    // 4. MENU BARU: SERAGAM MASUK (VENDOR & RESIGN)
    // ==========================================
    async function renderSeragamMasuk() {
      // Ambil opsi master seragam untuk form manual
      const resMaster = await fetch(`${SUPABASE_URL}/rest/v1/master_seragam?order=id.asc`, { headers: supabaseHeaders });
      const masterSeragam = await resMaster.json();

      let opsiSeragam = masterSeragam.map(m => `<option value="${m.id}">${m.nama_seragam} - ${m.gender} (${m.ukuran})</option>`).join('');

      document.getElementById('app').innerHTML = `
        <h3 class="fw-bold mb-4">Penerimaan Seragam Masuk</h3>
        <div class="card p-4 shadow-sm border-0 bg-white mb-4">
          <label class="fw-bold mb-2">Pilih Sumber Seragam Masuk:</label>
          <select id="sumberMasukSelect" class="form-select w-50" onchange="toggleAlurMasuk(this.value)">
            <option value="">-- Pilih Kategori Masuk --</option>
            <option value="Vendor">🏭 Kiriman Baru dari Vendor (Upload CSV Massal)</option>
            <option value="Resign - Bekas Layak">👤 Karyawan Resign - Bekas Layak (Input Manual)</option>
            <option value="Resign - Bekas Tidak Layak">👤 Karyawan Resign - Bekas Tidak Layak (Input Manual)</option>
          </select>
        </div>

        <div id="alurVendorArea" class="card p-4 shadow-sm border-0 bg-white d-none">
          <h5 class="fw-bold text-success mb-3"><i class="bi bi-file-earmark-excel me-2"></i>Upload Nota Pengadaan Vendor (.csv)</h5>
          <div class="row g-3 align-items-center">
            <div class="col-auto"><input type="file" id="vendorCsvPicker" accept=".csv" class="form-control form-control-sm"></div>
            <div class="col-auto"><button class="btn btn-sm btn-success px-3" onclick="eksekusiUploadCSVVendor()"><i class="bi bi-upload me-1"></i> Upload Nota Vendor</button></div>
            <div class="col-auto"><button class="btn btn-sm btn-outline-secondary px-3" onclick="downloadTemplateVendor()"><i class="bi bi-download me-1"></i> Download Template Vendor CSV</button></div>
          </div>
        </div>

        <div id="alurResignArea" class="card p-4 shadow-sm border-0 bg-white d-none">
          <h5 class="fw-bold text-primary mb-3"><i class="bi bi-person-down me-2"></i>Form Input Pengembalian Baju Karyawan Resign</h5>
          <form id="formResignManual" onsubmit="simpanResignManual(event)">
            <div class="mb-3 w-50">
              <label class="form-label small fw-bold">Nama Karyawan Resign</label>
              <input type="text" id="resignNama" class="form-control" required placeholder="Contoh: Budi Santoso">
            </div>
            <div class="mb-3 w-50">
              <label class="form-label small fw-bold">Pilih Item Baju Seragam</label>
              <select id="resignSeragamId" class="form-select" required>${opsiSeragam}</select>
            </div>
            <div class="mb-3 w-25">
              <label class="form-label small fw-bold">Jumlah Baju (Pcs)</label>
              <input type="number" id="resignJumlah" class="form-control" required min="1" value="1">
            </div>
            <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-save me-1"></i> Simpan Data Pengembalian</button>
          </form>
        </div>
      `;
    }

    function toggleAlurMasuk(sumber) {
      document.getElementById('alurVendorArea').classList.add('d-none');
      document.getElementById('alurResignArea').classList.add('d-none');
      if (sumber === 'Vendor') document.getElementById('alurVendorArea').classList.remove('d-none');
      if (sumber && sumber.includes('Resign')) document.getElementById('alurResignArea').classList.remove('d-none');
    }

    async function simpanResignManual(e) {
      e.preventDefault();
      showLoader(true);
      const sumber = document.getElementById('sumberMasukSelect').value;
      const nama = document.getElementById('resignNama').value;
      const seragamId = document.getElementById('resignSeragamId').value;
      const jumlah = document.getElementById('resignJumlah').value;

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/transaksi_seragam`, {
          method: "POST",
          headers: supabaseHeaders,
          body: JSON.stringify({
            tipe_transaksi: "MASUK",
            jenis_sumber: sumber,
            seragam_id: parseInt(seragamId),
            jumlah: parseInt(jumlah),
            keterangan: `Pengembalian baju dari mantan karyawan bernama ${nama}`
          })
        });
        if (res.ok) {
          Swal.fire('Sukses!', 'Data pengembalian resign berhasil dicatat manual!', 'success');
          document.getElementById('formResignManual').reset();
        }
      } catch (err) { console.error(err); }
      showLoader(false);
    }

    // ==========================================
    // 5. MENU BARU: PEMINJAMAN EVENT & PENGEMBALIAN
    // ==========================================
    async function renderPeminjamanEvent() {
      showLoader(true);
      try {
        // Ambil opsi seragam
        const resMaster = await fetch(`${SUPABASE_URL}/rest/v1/master_seragam?order=id.asc`, { headers: supabaseHeaders });
        const masterSeragam = await resMaster.json();
        let opsiSeragam = masterSeragam.map(m => `<option value="${m.id}">${m.nama_seragam} - ${m.gender} (${m.ukuran})</option>`).join('');

        // Ambil riwayat peminjaman yang aktif (Event Keluar minus Event Masuk yang bersesuaian)
        // Cara simpel untuk demo: Kita ambil riwayat transaksi dengan jenis_sumber = 'Event Keluar'
        const resTx = await fetch(`${SUPABASE_URL}/rest/v1/transaksi_seragam?jenis_sumber=eq.Event Keluar&order=id.desc`, { headers: supabaseHeaders });
        const dataTx = await resTx.json();

        let rows = dataTx.map(t => `
          <tr>
            <td><strong>#${t.id}</strong></td>
            <td>${t.keterangan || 'Event Alpro'}</td>
            <td>Seragam ID: #${t.seragam_id}</td>
            <td class="fw-bold text-danger">${t.jumlah} pcs</td>
            <td>
              <button class="btn btn-sm btn-outline-success" onclick="prosesPengembalianEvent(${t.seragam_id}, ${t.jumlah}, '${t.keterangan}')">
                <i class="bi bi-arrow-down-left-circle me-1"></i> Proses Kembali (Jadi Bekas Tidak Layak)
              </button>
            </td>
          </tr>
        `).join('');

        document.getElementById('app').innerHTML = `
          <h3 class="fw-bold mb-4">Manajemen Peminjaman Seragam Event</h3>
          
          <div class="card p-4 shadow-sm border-0 bg-white mb-4">
            <h5 class="fw-bold text-danger mb-3"><i class="bi bi-megaphone me-2"></i>Form Pengeluaran Peminjaman Event Baru</h5>
            <form onsubmit="simpanPeminjamanEvent(event)">
              <div class="row g-3">
                <div class="col-md-5">
                  <label class="form-label small fw-bold">Nama / Keterangan Event</label>
                  <input type="text" id="eventKeterangan" class="form-control form-control-sm" required placeholder="Contoh: Event Booth PRJ 2026">
                </div>
                <div class="col-md-4">
                  <label class="form-label small fw-bold">Pilih Item Baju</label>
                  <select id="eventSeragamId" class="form-select form-select-sm" required>${opsiSeragam}</select>
                </div>
                <div class="col-md-2">
                  <label class="form-label small fw-bold">Jumlah (Pcs)</label>
                  <input type="number" id="eventJumlah" class="form-control form-control-sm" required min="1" value="1">
                </div>
                <div class="col-md-1 d-flex align-items-end">
                  <button type="submit" class="btn btn-sm btn-danger w-100">Keluarkan</button>
                </div>
              </div>
            </form>
          </div>

          <div class="card p-4 shadow-sm border-0 bg-white">
            <h5 class="fw-bold text-dark mb-3">Monitoring Baju Keluar Event</h5>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light text-uppercase small">
                  <tr><th>ID Log</th><th>Keterangan Event</th><th>ID Item</th><th>Jumlah Keluar</th><th>Aksi Pulang</th></tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="5" class="text-center">Tidak ada pinjaman baju event aktif.</td></tr>'}</tbody>
              </table>
            </div>
          </div>
        `;
      } catch (err) { console.error(err); }
      showLoader(false);
    }

    async function simpanPeminjamanEvent(e) {
      e.preventDefault();
      showLoader(true);
      const ket = document.getElementById('eventKeterangan').value;
      const seragamId = document.getElementById('eventSeragamId').value;
      const jumlah = document.getElementById('eventJumlah').value;

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/transaksi_seragam`, {
          method: "POST",
          headers: supabaseHeaders,
          body: JSON.stringify({
            tipe_transaksi: "KELUAR",
            jenis_sumber: "Event Keluar",
            seragam_id: parseInt(seragamId),
            jumlah: parseInt(jumlah),
            keterangan: ket
          })
        });
        if (res.ok) {
          Swal.fire('Berhasil Keluar!', 'Baju dipinjam untuk kebutuhan event!', 'success');
          renderPeminjamanEvent();
        }
      } catch (err) { console.error(err); }
      showLoader(false);
    }

    async function prosesPengembalianEvent(seragamId, jumlah, ketLama) {
      showLoader(true);
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/transaksi_seragam`, {
          method: "POST",
          headers: supabaseHeaders,
          body: JSON.stringify({
            tipe_transaksi: "MASUK",
            jenis_sumber: "Event Masuk", // Otomatis masuk ke hitungan Stok Bekas Tidak Layak sesuai rumus VIEW kita kemarin
            seragam_id: seragamId,
            jumlah: jumlah,
            keterangan: `Pengembalian sukses dari: ${ketLama}`
          })
        });
        if (res.ok) {
          Swal.fire('Kembali Sukses!', 'Seragam aman masuk kembali ke kategori Bekas Tidak Layak Event.', 'success');
          renderPeminjamanEvent();
        }
      } catch (err) { console.error(err); }
      showLoader(false);
    }

    // ==========================================
    // 6. MENU RIWAYAT LOG MUTASI TRANSAKSI
    // ==========================================
    async function renderRiwayatTransaksi() {
      showLoader(true);
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/transaksi_seragam?order=tanggal_transaksi.desc`, { headers: supabaseHeaders });
        const data = await res.json();

        let rows = data.map(t => `
          <tr>
            <td><small>${new Date(t.tanggal_transaksi).toLocaleString('id-ID')}</small></td>
            <td><span class="badge ${t.tipe_transaksi === 'MASUK' ? 'bg-success' : 'bg-danger'}">${t.tipe_transaksi}</span></td>
            <td><strong class="text-dark">${t.jenis_sumber}</strong></td>
            <td>Seragam ID: #${t.seragam_id}</td>
            <td class="fw-bold">${t.jumlah} pcs</td>
            <td><span class="text-muted small">${t.keterangan || '-'}</span></td>
          </tr>
        `).join('');

        document.getElementById('app').innerHTML = `
          <div class="card p-4 shadow-sm border-0 bg-white">
            <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-arrow-left-right me-2"></i>Log Buku Mutasi Transaksi Gudang</h4>
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light text-uppercase small">
                  <tr><th>Waktu Catat</th><th>Tipe</th><th>Sumber Alur</th><th>ID Item</th><th>Jumlah Mutasi</th><th>Keterangan</th></tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="6" class="text-center">Belum ada transaksi.</td></tr>'}</tbody>
              </table>
            </div>
          </div>
        `;
      } catch (err) { console.error(err); }
      showLoader(false);
    }

    // ==========================================
    // UTILITY: DOWNLOAD & UPLOAD CSV ENGINE
    // ==========================================
    function downloadTemplateRequest() {
      const header = ["nama_karyawan", "nip", "posisi_kerja", "departemen_cabang", "jenis_request", "gender_karyawan", "ukuran_jas", "ukuran_kemeja", "ukuran_kaos"];
      const data = [["Ahmad Fauzi", "10021", "Apoteker", "Cabang Menteng", "Karyawan Baru", "Pria", "L", "XL", "L"]];
      triggerDownload("template_request_seragam.csv", header, data);
    }

    function downloadTemplateVendor() {
      const header = ["seragam_id", "jumlah_masuk", "nota_vendor"];
      const data = [["1", "50", "INV-ALPRO-2026-001"], ["2", "100", "INV-ALPRO-2026-001"]];
      triggerDownload("template_vendor_masuk.csv", header, data);
    }

    function triggerDownload(filename, header, rows) {
      let csvContent = header.join(",") + "\n" + rows.map(r => r.join(",")).join("\n");
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.setAttribute("download", filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Upload CSV untuk Request Baru
    function eksekusiUploadCSV() {
      const filePicker = document.getElementById('csvFilePicker');
      if (filePicker.files.length === 0) { Swal.fire('Waduh!', 'Pilih file .csv dulu!', 'warning'); return; }
      const file = filePicker.files[0];
      const reader = new FileReader();
      showLoader(true);
      reader.onload = async function (e) {
        const lines = e.target.result.split("\n");
        const jsonBody = [];
        for (let i = 1; i < lines.length; i++) {
          const row = lines[i].split(",");
          if (row.length < 6 || row[0].trim() === "") continue;
          jsonBody.push({
            nama_karyawan: row[0].trim(), nip: row[1].trim(), posisi_kerja: row[2].trim(), departemen_cabang: row[3].trim(),
            jenis_request: row[4].trim(), gender_karyawan: row[5].trim(),
            ukuran_jas: row[6]?.trim() === 'NULL' || !row[6] ? null : row[6].trim(),
            ukuran_kemeja: row[7]?.trim() === 'NULL' || !row[7] ? null : row[7].trim(),
            ukuran_kaos: row[8]?.trim() === 'NULL' || !row[8] ? null : row[8].trim()
          });
        }
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/request_seragam`, {
            method: "POST", headers: { ...supabaseHeaders, "Prefer": "return=minimal" }, body: JSON.stringify(jsonBody)
          });
          if (res.ok) { Swal.fire('Sukses Massal!', `${jsonBody.length} Request Berhasil Ditambahkan!`, 'success'); renderRequestSeragam(); }
        } catch (err) { Swal.fire('Gagal!', err.message, 'error'); }
        showLoader(false);
      };
      reader.readAsText(file);
    }

    // Upload CSV Penerimaan Massal dari Vendor
    function eksekusiUploadCSVVendor() {
      const filePicker = document.getElementById('vendorCsvPicker');
      if (filePicker.files.length === 0) { Swal.fire('Waduh!', 'Pilih file .csv nota vendor dulu!', 'warning'); return; }
      const file = filePicker.files[0];
      const reader = new FileReader();
      showLoader(true);
      reader.onload = async function (e) {
        const lines = e.target.result.split("\n");
        const jsonBody = [];
        for (let i = 1; i < lines.length; i++) {
          const row = lines[i].split(",");
          if (row.length < 2 || row[0].trim() === "") continue;
          jsonBody.push({
            tipe_transaksi: "MASUK",
            jenis_sumber: "Vendor",
            seragam_id: parseInt(row[0].trim()),
            jumlah: parseInt(row[1].trim()),
            keterangan: `Penerimaan Vendor Massal Nota: ${row[2]?.trim() || '-'}`
          });
        }
        try {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/transaksi_seragam`, {
            method: "POST", headers: { ...supabaseHeaders, "Prefer": "return=minimal" }, body: JSON.stringify(jsonBody)
          });
          if (res.ok) { Swal.fire('Sukses Sinkron!', `Stok baru dari vendor berhasil bertambah sebanyak ${jsonBody.length} varian baju!`, 'success'); renderSeragamMasuk(); }
        } catch (err) { Swal.fire('Gagal!', err.message, 'error'); }
        showLoader(false);
      };
      reader.readAsText(file);
    }

    window.onload = function() { renderDashboard(); };
  </script>
